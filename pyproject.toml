[tool.black]
# Black configuration for BRAINBLUE URBAIN
line-length = 100
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
# isort configuration
profile = "black"
line_length = 100
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_gitignore = true
known_first_party = "backend"
known_third_party = [
    "flask",
    "flask_cors",
    "flask_jwt_extended",
    "sqlalchemy",
    "pandas",
    "numpy",
    "tensorflow",
    "xgboost",
]

[tool.pytest.ini_options]
# pytest configuration
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers --tb=short --disable-warnings"
markers = [
    "unit: unit tests",
    "integration: integration tests",
    "slow: slow tests",
    "api: API endpoint tests",
]

[tool.coverage.run]
# Coverage configuration
branch = true
source = ["backend"]
omit = [
    "*/__init__.py",
    "*/tests/*",
    "*/.venv/*",
    "*/venv/*",
    "*/migrations/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if sys.version_info",
    "@abstractmethod",
]

[tool.mypy]
# mypy configuration
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
plugins = []

[[tool.mypy.overrides]]
module = [
    "flask.*",
    "sqlalchemy.*",
    "pandas.*",
    "numpy.*",
]
ignore_missing_imports = true
